title: Entries
description: "Reprocessed register of interests for the Senedd/Welsh Parliament\n\
  Starting register date starts when this file was created (March 2025).\n"
custom:
  row_count: 1630
path: entries.parquet
name: entries
profile: data-resource
scheme: file
format: parquet
hashing: md5
encoding: utf-8
schema:
  fields:
  - name: person_id
    type: string
    description: TheyWorkForYou ID of the person the entry is associated with
    constraints:
      unique: false
    example: uk.org.publicwhip/person/10442
  - name: person_name
    type: string
    description: The name of the person the entry is associated with
    constraints:
      unique: false
    example: Adam Price MS
  - name: category_id
    type: string
    description: The ID of the category the entry is associated with
    constraints:
      unique: false
      enum:
      - '1'
      - '10'
      - '11'
      - '12'
      - '2'
      - '3'
      - '4'
      - '5'
      - '6'
      - '7'
      - '8'
      - '9'
    example: '1'
  - name: category_name
    type: string
    description: The name of the category the entry is associated with
    constraints:
      unique: false
    example: Directorships
  - name: entry_id
    type: string
    description: Unique ID for this entry
    constraints:
      unique: true
    example: 10442_11_00a4f30d1e
  - name: content
    type: string
    description: The content of the entry
    constraints:
      unique: false
    example: '-'
  - name: null_entry
    type: boolean
    description: Whether it's just an entry saying 'no interests' or similar.
    constraints:
      unique: false
      enum:
      - false
    example: 'False'
  - name: details
    type: string
    description: Machine friendly version of the two fields
    constraints:
      unique: false
    example: '{"category_1": "Entry in respect of: Member Name and nature of the employer:
      - BHNW (Christie Fields Ltd)  - EFE Bridge Street Ltd  - Emery Properties Ltd  -
      Emery Developments Ltd  - Emery Investments Ltd  - Gordon Emery Ltd  - Hampson
      & Kemp Ltd  - Business Homes (North West) Limited  - BHNW Developments Limited  -
      Business Homes (Wakefield) Limited Nature of the post: Director Amount of remuneration
      received: N/A Average number of hours devoted each week: N/A Additional information:
      Subsidiaries of Emery Farm Estates Limited (Registered 29 June 2026)"}'
  - name: first_register
    type: string
    description: The first register (that we publish) that this entry appeared in
    constraints:
      unique: false
    example: '2021-07-02'
  - name: last_register
    type: string
    description: The last register (that we publish) that this entry appeared in
    constraints:
      unique: false
    example: '2021-07-02'
  - name: in_latest_register
    type: boolean
    description: If this entry appears in the latest register
    constraints:
      unique: false
      enum:
      - false
      - true
    example: 'False'
hash: 15d29c2ed46478e8279a809147e399ea
